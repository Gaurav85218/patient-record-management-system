<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffc107;
            color: #000;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .patient-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #dee2e6;
            transition: all 0.3s;
        }

        .patient-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .patient-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .patient-info {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .patient-info strong {
            color: #555;
        }

        .verdict {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .verdict.Normal {
            background: #d4edda;
            color: #155724;
        }

        .verdict.Underweight {
            background: #fff3cd;
            color: #856404;
        }

        .verdict.Obese {
            background: #f8d7da;
            color: #721c24;
        }

        .sort-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .sort-controls select {
            width: auto;
            min-width: 150px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .api-url {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .api-url code {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Patient Management System</h1>
            <p>Manage patient records efficiently</p>
        </div>

        <div class="api-url">
            <strong>API Base URL:</strong> <code id="apiUrl">http://localhost:8000</code>
            <input type="text" id="apiUrlInput" placeholder="Enter API URL" value="http://localhost:8000" style="margin-top: 10px;">
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('view')">View All</button>
            <button class="tab" onclick="switchTab('create')">Add Patient</button>
            <button class="tab" onclick="switchTab('search')">Search Patient</button>
            <button class="tab" onclick="switchTab('update')">Update Patient</button>
            <button class="tab" onclick="switchTab('delete')">Delete Patient</button>
        </div>

        <div class="content">
            <div id="message"></div>

            <!-- View All Patients -->
            <div id="view" class="tab-content active">
                <h2>All Patients</h2>
                <div class="sort-controls">
                    <label>Sort By:</label>
                    <select id="sortBy">
                        <option value="height">Height</option>
                        <option value="weight">Weight</option>
                        <option value="bmi">BMI</option>
                    </select>
                    <select id="sortOrder">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                    <button class="btn btn-primary" onclick="sortPatients()">Sort</button>
                    <button class="btn btn-primary" onclick="viewAllPatients()">Refresh</button>
                </div>
                <div id="patientsContainer" class="patients-grid"></div>
            </div>

            <!-- Create Patient -->
            <div id="create" class="tab-content">
                <h2>Add New Patient</h2>
                <form onsubmit="createPatient(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Patient ID *</label>
                            <input type="text" id="createId" required placeholder="e.g., P001">
                        </div>
                        <div class="form-group">
                            <label>Name *</label>
                            <input type="text" id="createName" required placeholder="Enter name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" id="createCity" required placeholder="Enter city">
                        </div>
                        <div class="form-group">
                            <label>Age *</label>
                            <input type="number" id="createAge" required min="1" max="119" placeholder="Enter age">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="createGender" required>
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="others">Others</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Height (meters) *</label>
                            <input type="number" step="0.01" id="createHeight" required min="0.1" placeholder="e.g., 1.75">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Weight (kg) *</label>
                        <input type="number" step="0.1" id="createWeight" required min="1" placeholder="e.g., 70.5">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Patient</button>
                </form>
            </div>

            <!-- Search Patient -->
            <div id="search" class="tab-content">
                <h2>Search Patient</h2>
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text" id="searchId" placeholder="Enter patient ID">
                </div>
                <button class="btn btn-primary" onclick="searchPatient()">Search</button>
                <div id="searchResult" style="margin-top: 20px;"></div>
            </div>

            <!-- Update Patient -->
            <div id="update" class="tab-content">
                <h2>Update Patient</h2>
                <div class="form-group">
                    <label>Patient ID *</label>
                    <input type="text" id="updateId" required placeholder="Enter patient ID">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="updateName" placeholder="Leave blank to keep unchanged">
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="updateCity" placeholder="Leave blank to keep unchanged">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="updateAge" min="1" max="119" placeholder="Leave blank to keep unchanged">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="updateGender">
                            <option value="">Keep unchanged</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Height (meters)</label>
                        <input type="number" step="0.01" id="updateHeight" min="0.1" placeholder="Leave blank to keep unchanged">
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" id="updateWeight" min="1" placeholder="Leave blank to keep unchanged">
                    </div>
                </div>
                <button class="btn btn-warning" onclick="updatePatient()">Update Patient</button>
            </div>

            <!-- Delete Patient -->
            <div id="delete" class="tab-content">
                <h2>Delete Patient</h2>
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text" id="deleteId" placeholder="Enter patient ID">
                </div>
                <button class="btn btn-danger" onclick="deletePatient()">Delete Patient</button>
            </div>
        </div>
    </div>

    <script>
        let API_URL = 'http://localhost:8000';

        document.getElementById('apiUrlInput').addEventListener('change', function(e) {
            API_URL = e.target.value;
            document.getElementById('apiUrl').textContent = API_URL;
        });

        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            clearMessage();
            
            if (tabName === 'view') {
                viewAllPatients();
            }
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            setTimeout(() => messageDiv.innerHTML = '', 5000);
        }

        function clearMessage() {
            document.getElementById('message').innerHTML = '';
        }

        async function viewAllPatients() {
            try {
                const response = await fetch(`${API_URL}/view`);
                const data = await response.json();
                
                const container = document.getElementById('patientsContainer');
                container.innerHTML = '';
                
                if (Object.keys(data).length === 0) {
                    container.innerHTML = '<p>No patients found</p>';
                    return;
                }
                
                for (const [id, patient] of Object.entries(data)) {
                    const card = createPatientCard(id, patient);
                    container.appendChild(card);
                }
            } catch (error) {
                showMessage('Error loading patients: ' + error.message, 'error');
            }
        }

        function createPatientCard(id, patient) {
            const card = document.createElement('div');
            card.className = 'patient-card';
            card.innerHTML = `
                <h3>ID: ${id}</h3>
                <div class="patient-info"><strong>Name:</strong> <span>${patient.name}</span></div>
                <div class="patient-info"><strong>City:</strong> <span>${patient.city}</span></div>
                <div class="patient-info"><strong>Age:</strong> <span>${patient.age} years</span></div>
                <div class="patient-info"><strong>Gender:</strong> <span>${patient.gender}</span></div>
                <div class="patient-info"><strong>Height:</strong> <span>${patient.height} m</span></div>
                <div class="patient-info"><strong>Weight:</strong> <span>${patient.weight} kg</span></div>
                <div class="patient-info"><strong>BMI:</strong> <span>${patient.bmi}</span></div>
                <span class="verdict ${patient.verdict}">${patient.verdict}</span>
            `;
            return card;
        }

        async function sortPatients() {
            const sortBy = document.getElementById('sortBy').value;
            const order = document.getElementById('sortOrder').value;
            
            try {
                const response = await fetch(`${API_URL}/sort?sort_by=${sortBy}&order=${order}`);
                const data = await response.json();
                
                const container = document.getElementById('patientsContainer');
                container.innerHTML = '';
                
                data.forEach((patient, index) => {
                    const card = createPatientCard(`Patient ${index + 1}`, patient);
                    container.appendChild(card);
                });
                
                showMessage('Patients sorted successfully', 'success');
            } catch (error) {
                showMessage('Error sorting patients: ' + error.message, 'error');
            }
        }

        async function createPatient(e) {
            e.preventDefault();
            
            const patient = {
                id: document.getElementById('createId').value,
                name: document.getElementById('createName').value,
                city: document.getElementById('createCity').value,
                age: parseInt(document.getElementById('createAge').value),
                gender: document.getElementById('createGender').value,
                height: parseFloat(document.getElementById('createHeight').value),
                weight: parseFloat(document.getElementById('createWeight').value)
            };
            
            try {
                const response = await fetch(`${API_URL}/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patient)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Patient created successfully!', 'success');
                    e.target.reset();
                } else {
                    showMessage(data.detail || 'Error creating patient', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function searchPatient() {
            const patientId = document.getElementById('searchId').value;
            
            if (!patientId) {
                showMessage('Please enter a patient ID', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/patient/${patientId}`);
                
                if (response.ok) {
                    const patient = await response.json();
                    const resultDiv = document.getElementById('searchResult');
                    const card = createPatientCard(patientId, patient);
                    resultDiv.innerHTML = '';
                    resultDiv.appendChild(card);
                    showMessage('Patient found!', 'success');
                } else {
                    const data = await response.json();
                    showMessage(data.detail || 'Patient not found', 'error');
                    document.getElementById('searchResult').innerHTML = '';
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function updatePatient() {
            const patientId = document.getElementById('updateId').value;
            
            if (!patientId) {
                showMessage('Please enter a patient ID', 'error');
                return;
            }
            
            const updates = {};
            
            const name = document.getElementById('updateName').value;
            const city = document.getElementById('updateCity').value;
            const age = document.getElementById('updateAge').value;
            const gender = document.getElementById('updateGender').value;
            const height = document.getElementById('updateHeight').value;
            const weight = document.getElementById('updateWeight').value;
            
            if (name) updates.name = name;
            if (city) updates.city = city;
            if (age) updates.age = parseInt(age);
            if (gender) updates.gender = gender;
            if (height) updates.height = parseFloat(height);
            if (weight) updates.weight = parseFloat(weight);
            
            if (Object.keys(updates).length === 0) {
                showMessage('Please provide at least one field to update', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/edit/${patientId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Patient updated successfully!', 'success');
                    document.getElementById('updateId').value = '';
                    document.getElementById('updateName').value = '';
                    document.getElementById('updateCity').value = '';
                    document.getElementById('updateAge').value = '';
                    document.getElementById('updateGender').value = '';
                    document.getElementById('updateHeight').value = '';
                    document.getElementById('updateWeight').value = '';
                } else {
                    showMessage(data.detail || 'Error updating patient', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function deletePatient() {
            const patientId = document.getElementById('deleteId').value;
            
            if (!patientId) {
                showMessage('Please enter a patient ID', 'error');
                return;
            }
            
            if (!confirm(`Are you sure you want to delete patient ${patientId}?`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/delete/${patientId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Patient deleted successfully!', 'success');
                    document.getElementById('deleteId').value = '';
                } else {
                    showMessage(data.detail || 'Error deleting patient', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Load patients on page load
        window.addEventListener('load', viewAllPatients);
    </script>
</body>
</html>
